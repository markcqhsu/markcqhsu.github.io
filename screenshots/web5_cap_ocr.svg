<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif">
  <!-- Background -->
  <rect width="900" height="560" fill="#f0f2f5"/>

  <!-- Header -->
  <rect width="900" height="52" fill="#1e3a5f"/>
  <rect x="16" y="14" width="24" height="24" rx="4" fill="none" stroke="#7fb3d3" stroke-width="1.5"/>
  <line x1="20" y1="20" x2="36" y2="20" stroke="#7fb3d3" stroke-width="1.5"/>
  <line x1="20" y1="26" x2="36" y2="26" stroke="#7fb3d3" stroke-width="1.5"/>
  <line x1="20" y1="32" x2="36" y2="32" stroke="#7fb3d3" stroke-width="1.5"/>
  <text x="52" y="32" font-size="17" font-weight="600" fill="white">THC 生產OCR辨識系統</text>
  <!-- Version badge -->
  <rect x="265" y="18" width="48" height="18" rx="9" fill="#2d5a8e"/>
  <text x="289" y="31" font-size="11" fill="#a8c8e8" text-anchor="middle">v1.3.6</text>

  <!-- Step 1 Card -->
  <rect x="30" y="72" width="840" height="160" rx="12" fill="white" filter="url(#shadow)"/>
  <!-- Step 1 Label -->
  <circle cx="58" cy="104" r="16" fill="#1e3a5f"/>
  <text x="58" y="109" font-size="14" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="84" y="110" font-size="16" font-weight="600" fill="#1e3a5f">選擇表單類型</text>

  <!-- Form Type Cards -->
  <!-- Card 1 - Selected -->
  <rect x="50" y="124" width="190" height="90" rx="8" fill="white" stroke="#1e3a5f" stroke-width="2"/>
  <rect x="58" y="134" width="32" height="18" rx="4" fill="#1e3a5f"/>
  <text x="74" y="147" font-size="10" fill="white" text-anchor="middle">塑蓋</text>
  <text x="145" y="172" font-size="13" font-weight="600" fill="#1e3a5f" text-anchor="middle">塑蓋廠不良率紀錄表</text>
  <text x="145" y="192" font-size="10" fill="#6b7280" text-anchor="middle">各站別日產量、不良率、廢料記錄</text>

  <!-- Card 2 -->
  <rect x="255" y="124" width="185" height="90" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="263" y="134" width="32" height="18" rx="4" fill="#3b6ea5"/>
  <text x="279" y="147" font-size="10" fill="white" text-anchor="middle">瓶胚</text>
  <text x="348" y="172" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Husky 製程管制標準</text>
  <text x="348" y="192" font-size="10" fill="#6b7280" text-anchor="middle">EM04 / EM06 / EM07 注塑參數記錄</text>

  <!-- Card 3 -->
  <rect x="455" y="124" width="185" height="90" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="463" y="134" width="32" height="18" rx="4" fill="#3b6ea5"/>
  <text x="479" y="147" font-size="10" fill="white" text-anchor="middle">瓶胚</text>
  <text x="548" y="172" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Hpp5 製程管制標準</text>
  <text x="548" y="192" font-size="10" fill="#6b7280" text-anchor="middle">EM16 注塑參數記錄</text>

  <!-- Card 4 -->
  <rect x="655" y="124" width="185" height="90" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="663" y="134" width="32" height="18" rx="4" fill="#3b6ea5"/>
  <text x="679" y="147" font-size="10" fill="white" text-anchor="middle">瓶胚</text>
  <text x="748" y="172" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Netstal 製程管制標準</text>
  <text x="748" y="192" font-size="10" fill="#6b7280" text-anchor="middle">EM09 / EM13 注塑參數記錄</text>

  <!-- Step 2 Card -->
  <rect x="30" y="248" width="840" height="270" rx="12" fill="white" filter="url(#shadow)"/>
  <!-- Step 2 Label -->
  <circle cx="58" cy="280" r="16" fill="#1e3a5f"/>
  <text x="58" y="285" font-size="14" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="84" y="286" font-size="16" font-weight="600" fill="#1e3a5f">上傳表單圖片</text>
  <text x="220" y="286" font-size="14" fill="#6b7280">塑蓋廠不良率紀錄表</text>

  <!-- Upload Area -->
  <rect x="50" y="302" width="820" height="170" rx="8" fill="white" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Upload icon -->
  <path d="M450 370 L450 420" stroke="#9ca3af" stroke-width="2"/>
  <path d="M430 390 L450 370 L470 390" stroke="#9ca3af" stroke-width="2" fill="none"/>
  <rect x="430" y="420" width="40" height="4" rx="2" fill="#9ca3af"/>
  <text x="450" y="455" font-size="14" fill="#6b7280" text-anchor="middle">點擊或拖曳圖片到此處</text>
  <text x="450" y="474" font-size="12" fill="#9ca3af" text-anchor="middle">支援 JPG、PNG、BMP</text>

  <!-- Buttons -->
  <rect x="50" y="486" width="100" height="36" rx="6" fill="#9ca3af"/>
  <text x="100" y="509" font-size="14" fill="white" text-anchor="middle">開始辨識</text>
  <rect x="162" y="486" width="80" height="36" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <text x="202" y="509" font-size="14" fill="#ef4444" text-anchor="middle">清空</text>

  <!-- Filter definition -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>
  </defs>
</svg>
